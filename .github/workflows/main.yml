name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: 38a77589121bd7ec6487927b79c191a75d4ebdd6

jobs:
  build-github:
    name: Build (GitHub)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake cppcheck curl git ninja-build perl pkg-config tar unzip zip

      - name: Prepare vcpkg
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "${RUNNER_TEMP}/vcpkg"
          git -C "${RUNNER_TEMP}/vcpkg" checkout "${VCPKG_COMMIT}"
          "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "${RUNNER_TEMP}/vcpkg-cache"
          {
            echo "VCPKG_ROOT=${RUNNER_TEMP}/vcpkg"
            echo "VCPKG_BINARY_SOURCES=clear;files,${RUNNER_TEMP}/vcpkg-cache,readwrite"
            echo "VCPKG_TARGET_TRIPLET=x64-linux"
          } >> "${GITHUB_ENV}"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure
        shell: bash
        run: cmake --preset ci -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Static analysis
        shell: bash
        run: |
          set -euo pipefail
          if command -v cppcheck >/dev/null 2>&1; then
            cmake --build --preset ci --target abrade_cppcheck
          else
            echo "::notice::cppcheck is not installed on this runner; skipping optional static analysis"
          fi

      - name: Test
        run: ctest --preset ci

      - name: Smoke CLI
        shell: bash
        run: |
          set -euo pipefail
          ./build/ci/abrade --help
          ./build/ci/abrade example.com '/items/{1:3}' --test
          printf '/a\n/b\n' | ./build/ci/abrade example.com --stdin --test

  hosted-validation:
    name: Hosted validation (${{ matrix.os }})
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install hosted dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake curl git ninja-build perl pkg-config tar unzip zip
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            brew install ninja
          fi

      - name: Prepare vcpkg
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64) triplet="x64-linux" ;;
            macOS-X64) triplet="x64-osx" ;;
            macOS-ARM64) triplet="arm64-osx" ;;
            Windows-X64) triplet="x64-windows-static" ;;
            *) echo "Unsupported runner ${RUNNER_OS}-${RUNNER_ARCH}" >&2; exit 1 ;;
          esac

          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "${RUNNER_TEMP}/vcpkg"
          git -C "${RUNNER_TEMP}/vcpkg" checkout "${VCPKG_COMMIT}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            vcpkg_root="$(cygpath -m "${RUNNER_TEMP}/vcpkg")"
            vcpkg_cache="$(cygpath -m "${RUNNER_TEMP}/vcpkg-cache")"
            "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          else
            vcpkg_root="${RUNNER_TEMP}/vcpkg"
            vcpkg_cache="${RUNNER_TEMP}/vcpkg-cache"
            "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          mkdir -p "${RUNNER_TEMP}/vcpkg-cache"
          {
            echo "VCPKG_ROOT=${vcpkg_root}"
            echo "VCPKG_BINARY_SOURCES=clear;files,${vcpkg_cache},readwrite"
            echo "VCPKG_TARGET_TRIPLET=${triplet}"
          } >> "${GITHUB_ENV}"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: cmake --preset ci -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Configure
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -property installationPath
          $vcvars = Join-Path $vs "VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$vcvars`" && cmake --preset ci -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TARGET_TRIPLET"

      - name: Build
        if: ${{ runner.os != 'Windows' }}
        run: cmake --build --preset ci --parallel

      - name: Build
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -property installationPath
          $vcvars = Join-Path $vs "VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$vcvars`" && cmake --build --preset ci --parallel"

      - name: Test
        if: ${{ runner.os != 'Windows' }}
        run: ctest --preset ci

      - name: Test
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -property installationPath
          $vcvars = Join-Path $vs "VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$vcvars`" && ctest --preset ci"

      - name: Smoke CLI
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          ./build/ci/abrade --help
          ./build/ci/abrade example.com '/items/{1:3}' --test
          printf '/a\n/b\n' | ./build/ci/abrade example.com --stdin --test

      - name: Smoke CLI
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          .\build\ci\abrade.exe --help
          .\build\ci\abrade.exe example.com '/items/{1:3}' --test
          "/a`n/b`n" | .\build\ci\abrade.exe example.com --stdin --test
