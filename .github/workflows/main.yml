name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: 38a77589121bd7ec6487927b79c191a75d4ebdd6

jobs:
  build-marvin:
    name: Build (Marvin)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, marvin, abrade-temp]
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          uname -a
          cmake --version
          ninja --version
          git --version

      - name: Prepare vcpkg
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "${RUNNER_TEMP}/vcpkg"
          git -C "${RUNNER_TEMP}/vcpkg" checkout "${VCPKG_COMMIT}"
          "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "${RUNNER_TEMP}/vcpkg-cache"
          {
            echo "VCPKG_ROOT=${RUNNER_TEMP}/vcpkg"
            echo "VCPKG_BINARY_SOURCES=clear;files,${RUNNER_TEMP}/vcpkg-cache,readwrite"
            echo "VCPKG_TARGET_TRIPLET=x64-linux"
          } >> "${GITHUB_ENV}"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure
        shell: bash
        run: cmake --preset ci -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Test
        run: ctest --preset ci

      - name: Smoke CLI
        shell: bash
        run: |
          set -euo pipefail
          ./build/ci/abrade --help
          ./build/ci/abrade example.com '/items/{1:3}' --test
          printf '/a\n/b\n' | ./build/ci/abrade example.com --stdin --test

      - name: Upload abrade artifact
        uses: actions/upload-artifact@v4
        with:
          name: abrade-linux-x64
          path: build/ci/abrade
          if-no-files-found: error

  build-fork-pr:
    name: Build (fork PR)
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake curl git ninja-build perl pkg-config tar unzip zip

      - name: Prepare vcpkg
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "${RUNNER_TEMP}/vcpkg"
          git -C "${RUNNER_TEMP}/vcpkg" checkout "${VCPKG_COMMIT}"
          "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "${RUNNER_TEMP}/vcpkg-cache"
          {
            echo "VCPKG_ROOT=${RUNNER_TEMP}/vcpkg"
            echo "VCPKG_BINARY_SOURCES=clear;files,${RUNNER_TEMP}/vcpkg-cache,readwrite"
            echo "VCPKG_TARGET_TRIPLET=x64-linux"
          } >> "${GITHUB_ENV}"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure
        shell: bash
        run: cmake --preset ci -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Test
        run: ctest --preset ci

      - name: Smoke CLI
        shell: bash
        run: |
          set -euo pipefail
          ./build/ci/abrade --help
          ./build/ci/abrade example.com '/items/{1:3}' --test
          printf '/a\n/b\n' | ./build/ci/abrade example.com --stdin --test

  hosted-validation:
    name: Hosted validation (${{ matrix.os }})
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install hosted dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake curl git ninja-build perl pkg-config tar unzip zip
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            brew install ninja
          fi

      - name: Prepare vcpkg
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64) triplet="x64-linux" ;;
            macOS-X64) triplet="x64-osx" ;;
            macOS-ARM64) triplet="arm64-osx" ;;
            Windows-X64) triplet="x64-windows-static" ;;
            *) echo "Unsupported runner ${RUNNER_OS}-${RUNNER_ARCH}" >&2; exit 1 ;;
          esac

          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "${RUNNER_TEMP}/vcpkg"
          git -C "${RUNNER_TEMP}/vcpkg" checkout "${VCPKG_COMMIT}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          else
            "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          mkdir -p "${RUNNER_TEMP}/vcpkg-cache"
          {
            echo "VCPKG_ROOT=${RUNNER_TEMP}/vcpkg"
            echo "VCPKG_BINARY_SOURCES=clear;files,${RUNNER_TEMP}/vcpkg-cache,readwrite"
            echo "VCPKG_TARGET_TRIPLET=${triplet}"
          } >> "${GITHUB_ENV}"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure
        shell: bash
        run: cmake --preset ci -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Test
        run: ctest --preset ci

      - name: Smoke CLI
        shell: bash
        run: |
          set -euo pipefail
          exe="./build/ci/abrade"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            exe="./build/ci/abrade.exe"
          fi
          "${exe}" --help
          "${exe}" example.com '/items/{1:3}' --test
          printf '/a\n/b\n' | "${exe}" example.com --stdin --test
